<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PJSK Player 歌曲库</title>
    <style>
        :root { --theme: #884499; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
            background: #1a1220;
            color: #fff;
            min-height: 100vh;
            position: relative;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 0;
            background:
                radial-gradient(ellipse 70% 60% at 30% 30%, rgba(136,68,153,0.35) 0%, transparent 55%),
                radial-gradient(ellipse 50% 50% at 75% 70%, rgba(136,68,153,0.22) 0%, transparent 50%);
            filter: blur(80px);
            pointer-events: none;
        }
        .header {
            position: relative;
            z-index: 1;
            padding: 48px 40px 16px;
            max-width: 1200px;
            margin: 0 auto;
            text-align: center;
        }
        .header h1 {
            font-size: 36px;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .header p {
            color: #999;
            margin-top: 8px;
            font-size: 14px;
            letter-spacing: 1px;
        }
        .header .count {
            margin-top: 4px;
            font-size: 13px;
            color: rgba(168,85,247,0.6);
        }
        .song-grid {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 40px 80px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 24px;
        }
        .song-card {
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.25,0.1,0.25,1);
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            background: rgba(255,255,255,0.04);
        }
        .song-card:hover {
            transform: translateY(-6px) scale(1.02);
        }
        .song-card:active { transform: scale(0.96); }
        .card-cover {
            width: 100%;
            aspect-ratio: 1;
            border-radius: 12px;
            overflow: hidden;
            background: linear-gradient(135deg, #2d2d5e, #1a1a3e);
            position: relative;
            box-shadow: 0 8px 24px rgba(0,0,0,0.4);
            transition: box-shadow 0.35s ease;
        }
        .song-card:hover .card-cover {
            box-shadow: 0 12px 36px rgba(136,68,153,0.3);
        }
        .card-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.4s ease;
        }
        .song-card:hover .card-cover img {
            transform: scale(1.08);
        }
        .card-cover .play-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.45);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(2px);
        }
        .song-card:hover .play-overlay { opacity: 1; }
        .play-overlay .play-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(136,68,153,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: #fff;
            transform: scale(0.7);
            transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
        }
        .song-card:hover .play-icon {
            transform: scale(1);
        }
        .card-info {
            padding: 12px 4px 4px;
        }
        .card-title {
            font-size: 15px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-artist {
            font-size: 13px;
            color: #888;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-badges {
            display: flex;
            gap: 6px;
            margin-top: 6px;
        }
        .card-badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 8px;
            background: rgba(136,68,153,0.15);
            color: rgba(255,255,255,0.5);
        }
        .card-badge.ok { color: #6cf; background: rgba(102,204,255,0.1); }
        .card-badge.missing { color: #f66; background: rgba(255,102,102,0.1); }
        .card-badge.perfect { color: #6f6; background: rgba(102,255,102,0.1); }

        /* ── 工具栏（标题与封面墙之间） ── */
        .toolbar {
            position: relative;
            z-index: 5;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 40px 8px;
            text-align: right;
        }

        /* ── 漏斗按钮 ── */
        .filter-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 38px;
            height: 38px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.05);
            color: #aaa;
            cursor: pointer;
            transition: all 0.25s;
        }
        .filter-btn:hover {
            background: rgba(168,85,247,0.18);
            border-color: rgba(168,85,247,0.3);
            color: #fff;
        }

        /* ── 弹出面板（按钮下方展开） ── */
        .filter-popup {
            position: absolute;
            top: calc(100% + 4px);
            right: 0;
            z-index: 200;
            background: rgba(25,18,30,0.98);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 14px;
            padding: 22px 24px;
            min-width: 230px;
            text-align: left;
            box-shadow: 0 16px 48px rgba(0,0,0,0.6);
            opacity: 0;
            pointer-events: none;
            transform: translateY(-6px);
            transition: all 0.25s cubic-bezier(0.22,1,0.36,1);
        }
        .filter-popup.open {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }
        .popup-title {
            font-size: 17px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
        }
        .popup-section {
            margin-bottom: 18px;
        }
        .popup-section:last-child { margin-bottom: 0; }
        .popup-section-title {
            font-size: 12px;
            font-weight: 600;
            color: rgba(168,85,247,0.7);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .filter-popup .filter-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #ccc;
            cursor: pointer;
            user-select: none;
            padding: 6px 0;
            transition: color 0.15s;
        }
        .filter-popup .filter-item:hover { color: #fff; }
        .filter-popup .filter-item input { display: none; }
        .filter-popup .filter-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid #555;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .filter-popup .filter-item input:checked + .filter-dot {
            border-color: transparent;
        }
        .filter-popup .filter-dot.dot-ok { background: transparent; }
        .filter-popup .filter-item input:checked + .filter-dot.dot-ok { background: #6f6; }
        .filter-popup .filter-dot.dot-warn { background: transparent; }
        .filter-popup .filter-item input:checked + .filter-dot.dot-warn { background: #6cf; }
        .filter-popup .filter-dot.dot-miss { background: transparent; }
        .filter-popup .filter-item input:checked + .filter-dot.dot-miss { background: #f66; }

        .filter-popup .sort-group {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .filter-popup .sort-option {
            cursor: pointer;
            color: #aaa;
            user-select: none;
            padding: 6px 0;
            border-radius: 0;
            transition: color 0.15s;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        .filter-popup .sort-option:hover { color: #fff; }
        .filter-popup .sort-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid #555;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .filter-popup .sort-option.active .sort-dot {
            border-color: transparent;
            background: #a855f7;
        }
        .filter-popup .sort-arrow {
            font-size: 10px;
            color: #888;
            margin-left: auto;
            transition: color 0.15s;
        }
        .filter-popup .sort-option.active .sort-arrow { color: #a855f7; }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: #666;
        }
        .empty-state .icon { font-size: 56px; margin-bottom: 16px; }
        .empty-state h3 { font-size: 20px; margin-bottom: 8px; color: #999; }
        .empty-state p { font-size: 14px; line-height: 1.6; }
        .empty-state code {
            background: rgba(255,255,255,0.08);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 13px;
            color: #c084fc;
        }

        /* 加载动画 */
        .song-grid.loading .song-card {
            opacity: 0;
            animation: fadeUp 0.4s ease forwards;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 800px) {
            .song-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 16px; padding: 16px 16px 60px; }
            .header { padding: 32px 16px 8px; }
            .header h1 { font-size: 28px; }
            .toolbar { padding: 0 16px 6px; }
        }
        @media (max-width: 480px) {
            .song-grid { grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px 12px 40px; }
            .card-title { font-size: 13px; }
            .card-artist { font-size: 11px; }
            .play-overlay .play-icon { width: 44px; height: 44px; font-size: 20px; }
            .toolbar { padding: 0 12px 4px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>♪ PJSK Player</h1>
        <p>点击封面播放歌曲</p>
        <div class="count" id="songCount"></div>
    </div>
    <div class="toolbar">
        <button class="filter-btn" id="filterBtn" onclick="togglePopup()" title="筛选与排序">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 3H2l8 9.46V19l4 2v-8.54L22 3z"/></svg>
        </button>
        <div class="filter-popup" id="filterPopup">
            <div class="popup-title">筛选与排序</div>
            <div class="popup-section">
                <div class="popup-section-title">筛选</div>
                <label class="filter-item">
                    <input type="checkbox" id="filterComplete" checked onchange="onFilterChange()">
                    <span class="filter-dot dot-ok"></span> 完整
                </label>
                <label class="filter-item">
                    <input type="checkbox" id="filterNoLyrics" onchange="onFilterChange()">
                    <span class="filter-dot dot-warn"></span> 无歌词
                </label>
                <label class="filter-item">
                    <input type="checkbox" id="filterUnavailable" onchange="onFilterChange()">
                    <span class="filter-dot dot-miss"></span> 不可用
                </label>
            </div>
            <div class="popup-section">
                <div class="popup-section-title">排序</div>
                <div class="sort-group">
                    <span class="sort-option active" data-sort="id" onclick="onSortClick('id')">
                        <span class="sort-dot" id="sortDotId"></span> 歌曲ID
                        <span class="sort-arrow" id="sortArrowId">▲</span>
                    </span>
                    <span class="sort-option" data-sort="title" onclick="onSortClick('title')">
                        <span class="sort-dot" id="sortDotTitle"></span> 标题
                        <span class="sort-arrow" id="sortArrowTitle"></span>
                    </span>
                </div>
            </div>
        </div>
    </div>
    <div class="song-grid" id="songGrid"></div>
    <script>
    // ═══════════════════════════════════════════════════════════
    // 从 songs.json 加载歌曲库
    // ═══════════════════════════════════════════════════════════
    let songs = [];
    let sortBy = 'id';
    let sortAsc = true;

    const LRC_IDS = new Set(['19','60','61','66','90']);

    function getSongBadge(s) {
        const audioOk = !!(s.neteaseId);
        const lyricOk = LRC_IDS.has(s.id);
        if (audioOk && lyricOk) return 'complete';
        if (audioOk) return 'no-lyrics';
        return 'unavailable';
    }

    function getFilteredSongs() {
        const fComp = document.getElementById('filterComplete').checked;
        const fNoLrc = document.getElementById('filterNoLyrics').checked;
        const fUnav = document.getElementById('filterUnavailable').checked;
        return songs.filter(s => {
            const badge = getSongBadge(s);
            if (badge === 'complete' && !fComp) return false;
            if (badge === 'no-lyrics' && !fNoLrc) return false;
            if (badge === 'unavailable' && !fUnav) return false;
            return true;
        });
    }

    function getSortedSongs(list) {
        const sorted = [...list];
        sorted.sort((a, b) => {
            let cmp;
            if (sortBy === 'id') {
                cmp = parseInt(a.id, 10) - parseInt(b.id, 10);
            } else {
                cmp = (a.title || '').localeCompare(b.title || '', 'zh-CN');
            }
            return sortAsc ? cmp : -cmp;
        });
        return sorted;
    }

    function updateSortUI() {
        document.querySelectorAll('.sort-option').forEach(el => {
            const val = el.dataset.sort;
            const isActive = val === sortBy;
            el.classList.toggle('active', isActive);
            const arrow = el.querySelector('.sort-arrow');
            if (arrow) arrow.textContent = isActive ? (sortAsc ? '▲' : '▼') : '';
        });
    }

    async function loadSongs() {
        try {
            const response = await fetch('songs.json');
            songs = await response.json();
            render();
        } catch (error) {
            console.error('加载失败:', error);
            renderError('无法加载 songs.json');
        }
    }

    function togglePopup() {
        document.getElementById('filterPopup').classList.toggle('open');
    }

    function closePopup() {
        document.getElementById('filterPopup').classList.remove('open');
    }

    function onFilterChange() {
        render();
    }

    function onSortClick(field) {
        if (sortBy === field) {
            sortAsc = !sortAsc;
        } else {
            sortBy = field;
            sortAsc = true;
        }
        updateSortUI();
        render();
    }

    // ═══════════════════════════════════════════════════════════
    // 渲染封面墙
    // ═══════════════════════════════════════════════════════════
    function render() {
        const grid = document.getElementById('songGrid');
        const filtered = getFilteredSongs();
        const sorted = getSortedSongs(filtered);
        document.getElementById('songCount').textContent = `共 ${songs.length} 首（显示 ${sorted.length} 首）`;

        if (sorted.length === 0) {
            grid.innerHTML = `
                <div class="empty-state">
                    <div class="icon">🔍</div>
                    <h3>没有符合条件的歌曲</h3>
                    <p>请调整筛选条件</p>
                </div>`;
            return;
        }

        let html = '';
        sorted.forEach((s, i) => {
            const badgeType = getSongBadge(s);
            let badgeHtml;
            if (badgeType === 'complete') badgeHtml = '<span class="card-badge perfect">完整</span>';
            else if (badgeType === 'no-lyrics') badgeHtml = '<span class="card-badge ok">无歌词</span>';
            else badgeHtml = '<span class="card-badge missing">不可用</span>';

            const coverInner = s.cover
                ? `<img src="${s.cover}" alt="${s.title}" loading="lazy" />`
                : `<span style="font-size:40px;opacity:0.3;">🎵</span>`;
            html += `
                <div class="song-card" onclick="playSong('${s.id}')" style="animation-delay:${i * 0.04}s">
                    <div class="card-cover">
                        ${coverInner}
                        <div class="play-overlay"><div class="play-icon">▶</div></div>
                    </div>
                    <div class="card-info">
                        <div class="card-title">${s.title || '未命名歌曲'}</div>
                        <div class="card-artist">${s.artist || '未知歌手'}</div>
                        <div class="card-badges">${badgeHtml}</div>
                    </div>
                </div>`;
        });
        grid.innerHTML = html;
        grid.classList.add('loading');
    }

    function renderError(message) {
        const grid = document.getElementById('songGrid');
        grid.innerHTML = `
            <div class="empty-state" style="color:#e55;">
                <div class="icon">⚠️</div>
                <h3>加载失败</h3>
                <p>${message}</p>
                <p style="margin-top:12px;font-size:13px;color:#888;">请确保 <code>songs.json</code> 存在且格式正确</p>
            </div>`;
    }

    // ═══════════════════════════════════════════════════════════
    // 点击歌曲 → 跳转播放器
    // ═══════════════════════════════════════════════════════════
    function playSong(id) {
        const song = songs.find(s => s.id === id);
        if (!song) { alert('歌曲数据未找到'); return; }
        const NETBASE = 'http://music.163.com/song/media/outer/url?id=';
        if (!song.neteaseId) { alert('该歌曲尚未配置音频文件'); return; }

        const data = {
            title: song.title || '',
            artist: song.artist || '',
            coverUrl: song.cover || '',
            audioUrl: NETBASE + song.neteaseId + '.mp3',
            lrcText: '',
        };
        localStorage.setItem('pjsk_song_' + id, JSON.stringify(data));
        window.location.href = 'player.html?id=' + encodeURIComponent(id);
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') closePopup();
    });
    document.addEventListener('click', e => {
        const popup = document.getElementById('filterPopup');
        const btn = document.getElementById('filterBtn');
        if (popup.classList.contains('open') && !popup.contains(e.target) && !btn.contains(e.target)) {
            closePopup();
        }
    });

    loadSongs();
    </script>
</body>
</html>
